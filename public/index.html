<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Knowledge Base</title>

  <!-- PWA -->
  <link rel="manifest" href="/manifest.json" />
  <meta name="theme-color" content="#4f46e5" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Knowledge Base" />
  <link rel="apple-touch-icon" href="/icons/kb-icon.svg" />

  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />

  <!-- Icons (Lucide UMD — exposes window.lucide) -->
  <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>

  <!-- Markdown + sanitizer (UMD — exposes window.marked and window.DOMPurify) -->
  <script src="https://cdn.jsdelivr.net/npm/marked@9/marked.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/dompurify@3/dist/purify.min.js"></script>

  <!-- Mermaid.js for diagram rendering -->
  <script src="https://cdn.jsdelivr.net/npm/mermaid@11/dist/mermaid.min.js"></script>

  <link rel="stylesheet" href="/css/styles.css" />
</head>
<body>

  <!-- AUTH OVERLAY — shown until session confirmed -->
  <div id="auth-overlay" class="overlay overlay--fullscreen" hidden>
    <div class="auth-card" id="auth-card">
      <div class="auth-logo">
        <svg viewBox="0 0 40 40" class="logo-mark" aria-hidden="true">
          <text x="2" y="30" font-family="Plus Jakarta Sans,sans-serif" font-size="28"
                font-weight="600" fill="currentColor">42</text>
        </svg>
        <span class="auth-title">Knowledge Base</span>
      </div>

      <div class="auth-form">
        <h2 class="auth-heading">Sign in</h2>
        <p id="auth-error" class="auth-error" hidden></p>
        <a href="/auth/google" class="btn btn--google btn--full" id="google-signin-btn">
          <svg viewBox="0 0 24 24" width="20" height="20" aria-hidden="true">
            <path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92a5.06 5.06 0 0 1-2.2 3.32v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.1z"/>
            <path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/>
            <path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/>
            <path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/>
          </svg>
          Sign in with Google
        </a>
      </div>
    </div>
  </div>

  <!-- MAIN APP — hidden until auth confirmed -->
  <div id="app" hidden>

    <!-- TOP BAR -->
    <header class="topbar" role="banner">
      <div class="topbar__left">
        <button class="icon-btn nav-toggle-btn" id="nav-toggle-btn"
                aria-label="Open navigation" aria-expanded="false">
          <i data-lucide="menu" aria-hidden="true"></i>
        </button>
        <a href="#" id="hq-link" class="hq-link" title="Knowledge Base" aria-label="Knowledge Base">
          <i data-lucide="book-open" aria-hidden="true"></i>
        </a>
        <span class="topbar__app-label">Knowledge Base</span>
      </div>
      <div class="topbar__centre">
        <span class="topbar__page-title" id="topbar-page-title"></span>
        <button class="search-trigger" id="search-trigger"
                aria-label="Search (Cmd+K)" aria-keyshortcuts="Meta+K">
          <i data-lucide="search" aria-hidden="true"></i>
          <span class="search-trigger__label">Search…</span>
          <kbd class="search-trigger__kbd">⌘K</kbd>
        </button>
      </div>
      <div class="topbar__right">
        <button class="icon-btn" id="map-btn" title="Map view" aria-label="Map view">
          <i data-lucide="network" aria-hidden="true"></i>
        </button>
        <button class="icon-btn" id="assets-btn" title="Asset browser" aria-label="Asset browser">
          <i data-lucide="layers" aria-hidden="true"></i>
        </button>
        <button class="icon-btn" id="settings-btn" title="Settings" aria-label="Settings">
          <i data-lucide="settings" aria-hidden="true"></i>
        </button>
        <button class="icon-btn" id="theme-btn" title="Toggle theme" aria-label="Toggle theme">
          <i data-lucide="moon" aria-hidden="true" id="theme-icon"></i>
        </button>
        <button class="avatar-btn" id="avatar-btn" aria-label="User menu">
          <span id="avatar-initials" class="avatar">?</span>
        </button>
      </div>
    </header>

    <!-- BODY -->
    <div class="body-layout">

      <!-- APP RAIL (54px) — SS42 app switcher -->
      <nav class="rail" role="navigation" aria-label="App navigation">
        <ul class="rail__list" id="app-rail" role="list"></ul>
      </nav>

      <!-- WORKSPACE STRIP — collapsible workspace navigation panel -->
      <div class="workspace-strip" id="workspace-strip" role="navigation" aria-label="Workspaces">
        <div class="workspace-strip__header">
          <button class="icon-btn workspace-strip__collapse-btn" id="workspace-strip-collapse"
                  title="Collapse workspaces" aria-label="Collapse workspace panel" aria-expanded="true">
            <i data-lucide="chevrons-left" aria-hidden="true"></i>
          </button>
        </div>
        <ul class="workspace-strip__list" id="workspace-strip-list" role="list"></ul>
        <div class="workspace-strip__footer">
          <button class="icon-btn workspace-strip__add-btn" id="add-workspace-btn"
                  title="Add workspace" aria-label="Add workspace">
            <i data-lucide="plus" aria-hidden="true"></i>
          </button>
        </div>
      </div>

      <!-- SECTION SIDEBAR (244px) -->
      <aside class="sidebar" role="complementary" aria-label="Sections and pages">
        <div class="sidebar__header">
          <span class="sidebar__workspace-label" id="sidebar-workspace-label"></span>
          <select class="sidebar__workspace-select" id="sidebar-workspace-select"
                  aria-label="Select workspace"></select>
        </div>
        <nav class="sidebar__nav">
          <ul class="section-list" id="section-list" role="list"></ul>
        </nav>
        <div class="sidebar__footer">
          <div class="sidebar__status-filters" role="group" aria-label="Page status filters">
            <button class="status-filter-btn" id="filter-drafts-btn"
                    aria-pressed="false" title="Show draft pages">
              <i data-lucide="file-pen" aria-hidden="true"></i>
              <span>Drafts</span>
            </button>
            <button class="status-filter-btn" id="filter-archived-btn"
                    aria-pressed="false" title="Show archived pages">
              <i data-lucide="archive" aria-hidden="true"></i>
              <span>Archived</span>
            </button>
          </div>
          <button class="sidebar__add-btn" id="add-section-btn"
                  title="Add section" aria-label="Add section">
            <i data-lucide="plus" aria-hidden="true"></i>
            <span>Add section</span>
          </button>
        </div>
      </aside>

      <!-- CONTENT PANE (flex) -->
      <main class="content-pane" id="content-pane" role="main">
        <div class="content-placeholder" id="content-placeholder">
          <i data-lucide="book-open" aria-hidden="true"></i>
          <p>Select a page to get started</p>
        </div>
      </main>

    </div><!-- /body-layout -->

    <!-- DRAWER BACKDROP (mobile — behind sidebar-as-drawer) -->
    <div id="drawer-backdrop" class="drawer-backdrop" aria-hidden="true"></div>

  </div><!-- /app -->

  <!-- SEARCH OVERLAY -->
  <div id="search-overlay" class="overlay overlay--search" hidden
       role="dialog" aria-modal="true" aria-label="Search">
    <div class="search-modal">
      <div class="search-modal__input-wrap">
        <i data-lucide="search" class="search-modal__icon" aria-hidden="true"></i>
        <input type="text" id="search-input" class="search-modal__input"
               placeholder="Search pages and assets…" autocomplete="off"
               aria-label="Search" aria-controls="search-results" />
        <button class="search-modal__close" id="search-close" aria-label="Close search">
          <kbd>Esc</kbd>
        </button>
      </div>
      <div class="search-modal__filters" id="search-filters">
        <button class="filter-chip filter-chip--active" data-filter="all">All</button>
        <button class="filter-chip" data-filter="pages">Pages</button>
        <button class="filter-chip" data-filter="assets">Assets</button>
      </div>
      <ul class="search-results" id="search-results" role="listbox"
          aria-label="Search results"></ul>
      <p class="search-empty" id="search-empty" hidden>No results found</p>
    </div>
  </div>

  <!-- SETTINGS OVERLAY -->
  <div id="settings-overlay" class="overlay overlay--panel" hidden
       role="dialog" aria-modal="true" aria-label="Settings">
    <div class="settings-panel">
      <div class="settings-panel__header">
        <h2 class="settings-panel__title">Settings</h2>
        <button class="icon-btn" id="settings-close" aria-label="Close settings">
          <i data-lucide="x" aria-hidden="true"></i>
        </button>
      </div>
      <div class="settings-panel__layout">
        <nav class="settings-panel__nav">
          <button class="settings-nav-item settings-nav-item--active"
                  data-section="workspaces">Workspaces</button>
          <button class="settings-nav-item" data-section="users">Users &amp; Roles</button>
          <button class="settings-nav-item" data-section="tokens">API Tokens</button>
          <button class="settings-nav-item" data-section="account">Account</button>
          <button class="settings-nav-item settings-nav-item--danger"
                  data-section="danger">Danger Zone</button>
        </nav>
        <div class="settings-panel__body" id="settings-body">
          <!-- Populated by settings.js -->
        </div>
      </div>
    </div>
  </div>

  <!-- EDITOR OVERLAY -->
  <div id="editor-overlay" class="overlay overlay--editor" hidden
       role="dialog" aria-modal="true" aria-label="Page editor">
    <div class="editor-modal">
      <div class="editor-modal__header">
        <input type="text" id="editor-title" class="editor-title-input"
               placeholder="Page title" aria-label="Page title" />
        <div class="editor-modal__actions">
          <button class="btn btn--ghost" id="editor-discard">Discard</button>
          <button class="btn btn--primary" id="editor-save">Save</button>
        </div>
      </div>
      <!-- EDITOR TOOLBAR -->
      <div class="editor-toolbar" role="toolbar" aria-label="Editor toolbar">
        <div class="editor-toolbar__group">
          <button class="toolbar-btn" data-action="bold" title="Bold" aria-label="Bold">
            <i data-lucide="bold" aria-hidden="true"></i>
          </button>
          <button class="toolbar-btn" data-action="italic" title="Italic" aria-label="Italic">
            <i data-lucide="italic" aria-hidden="true"></i>
          </button>
          <button class="toolbar-btn" data-action="heading" title="Heading" aria-label="Heading">
            <i data-lucide="heading" aria-hidden="true"></i>
          </button>
          <button class="toolbar-btn" data-action="link" title="Link" aria-label="Link">
            <i data-lucide="link" aria-hidden="true"></i>
          </button>
          <button class="toolbar-btn" data-action="code" title="Code block" aria-label="Code block">
            <i data-lucide="code" aria-hidden="true"></i>
          </button>
          <button class="toolbar-btn" data-action="bullet-list" title="Bullet list" aria-label="Bullet list">
            <i data-lucide="list" aria-hidden="true"></i>
          </button>
        </div>
        <div class="editor-toolbar__group">
          <button class="toolbar-btn" id="insert-diagram-btn" data-action="diagram"
                  title="Insert Diagram" aria-label="Insert Diagram" aria-haspopup="listbox">
            <i data-lucide="git-branch" aria-hidden="true"></i>
            <span class="toolbar-btn__label">Diagram</span>
          </button>
        </div>
        <div class="editor-toolbar__spacer"></div>
        <div class="editor-toolbar__group">
          <button class="toolbar-btn toolbar-btn--toggle" id="editor-mode-btn"
                  title="Toggle split view" aria-label="Toggle split/full view"
                  aria-pressed="true">
            <i data-lucide="columns-2" aria-hidden="true"></i>
          </button>
        </div>
      </div>
      <div class="editor-modal__body">
        <div class="editor-split" id="editor-split">
          <textarea id="editor-textarea" class="editor-textarea"
                    placeholder="Write in Markdown…"
                    aria-label="Page content editor"
                    spellcheck="true"></textarea>
          <div class="editor-preview" id="editor-preview"
               aria-label="Preview" aria-live="polite"></div>
        </div>
      </div>
    </div>
  </div>

  <!-- DIAGRAM TEMPLATE PICKER -->
  <div id="diagram-picker" class="diagram-picker" hidden
       role="listbox" aria-label="Choose diagram template">
    <!-- Populated by diagram-templates.js -->
  </div>

  <!-- TOAST CONTAINER -->
  <div class="toast-container" id="toast-container"
       role="status" aria-live="polite" aria-atomic="true"></div>

  <!-- App entry point -->
  <script type="module" src="/js/app.js"></script>

</body>
</html>
